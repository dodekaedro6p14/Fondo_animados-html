<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fondo Geométrico Animado - Python_negro Edition</title>
    <style>
        /* --- CONFIGURACIÓN ESTÁNDAR DE PÁGINA --- 
           (Invalida la mayoría de tus estilos por defecto, centrándose en el fondo)
        */
        :root {
            /* --- [EDITABLE: PARÁMETROS DE ESTILO] ---
               Modifica estos valores para cambiar la apariencia.
            */
            /* Fondo principal oscuro */
            --local-bg-color: #05080f; 

            /* Paleta de colores brillantes para las formas flotantes (Deben resaltar) */
            --local-shape-accent-1: rgba(0, 240, 255, 0.7); /* Cyan brillante */
            --local-shape-accent-2: rgba(129, 140, 248, 0.7); /* Indigo secundario */
            --local-shape-accent-3: rgba(255, 106, 0, 0.6);  /* Naranja resaltado (menor opacidad) */

            /* --- [EDITABLE: PARÁMETROS DE MOVIMIENTO] ---
               JavaScript lee este valor como la amplitud máxima del movimiento (bamboleo).
            */
            --local-max-drift: 30px; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Previene barras de desplazamiento durante la animación */
            background-color: var(--local-bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
        }

        /* --- CONTENEDOR DE LA ESCENA ---
           Fija la imagen base y el lienzo de animación.
        */
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 0; /* Capa base */
        }

        /* --- CAPA DE LA IMAGEN BASE ---
           Cargamos la imagen que enviaste como fondo estático pero nítido.
        */
        .image-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* [NOTA DE EDICIÓN]
               Reemplaza 'image_0.png' con la ruta correcta si mueves el archivo.
            */
            background-image: url('image_0.png'); 
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            opacity: 0.9; /* Un poco de transparencia para integrarlo con el fondo oscuro */
            z-index: 1;
        }

        /* --- CAPA DEL LIENZO (CANVAS) DE ANIMACIÓN ---
           JavaScript dibujará los fragmentos aquí.
        */
        #dynamic-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Permite clicks en elementos que estén DEBAJO */
            z-index: 2; /* Sobre la imagen base */
        }

        /* Ejemplo de contenido sobrepuesto para validar la profundidad */
        .content-overlay {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: auto;
            background: rgba(0,0,0,0.5);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="scene-container">
        <div class="image-background"></div>
        <canvas id="dynamic-canvas"></canvas>
    </div>

    <div class="content-overlay">
        <h1>Fondo Geométrico Flotante</h1>
        <p>Una animación exclusiva de Python_negro.</p>
        <p>Los fragmentos flotan +/- 30px (editable en CSS).</p>
    </div>

    <script>
        /* --- MOTOR DE ANIMACIÓN JAVASCRIPT ---
           Este script genera formas geométricas complejas y las mueve.
        */

        const canvas = document.getElementById('dynamic-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, maxDriftPixels;

        // Lista de fragmentos activos
        const fragments = [];

        // --- [EDITABLE: PARÁMETROS JS] ---
        // Aumenta o disminuye la densidad de la animación.
        const NUMBER_OF_FRAGMENTS = 70; 

        // Recuperar la distancia de movimiento definida en CSS
        function updateConfigFromCSS() {
            const rootStyle = getComputedStyle(document.documentElement);
            const driftStr = rootStyle.getPropertyValue('--local-max-drift').trim();
            maxDriftPixels = parseInt(driftStr, 10) || 30; // Fallback a 30 si falla la lectura
        }

        // Recuperar la paleta de colores definida en CSS
        function getColorPalette() {
            const rootStyle = getComputedStyle(document.documentElement);
            return [
                rootStyle.getPropertyValue('--local-shape-accent-1'),
                rootStyle.getPropertyValue('--local-shape-accent-2'),
                rootStyle.getPropertyValue('--local-shape-accent-3')
            ];
        }

        // Ajustar el tamaño del canvas a la ventana
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            updateConfigFromCSS();
        }

        // Clase que define un fragmento geométrico individual
        class Fragment {
            constructor(palette) {
                // Posición base (estática)
                this.baseX = Math.random() * width;
                this.baseY = Math.random() * height;
                
                // Posición actual (con movimiento)
                this.x = this.baseX;
                this.y = this.baseY;
                
                // Configuración de movimiento sinoidal
                this.seedX = Math.random() * Math.PI * 2; // Semilla de fase aleatoria
                this.seedY = Math.random() * Math.PI * 2;
                this.speedX = 0.001 + Math.random() * 0.003; // Velocidad lenta de bamboleo
                this.speedY = 0.001 + Math.random() * 0.003;

                // Propiedades visuales
                this.size = 2 + Math.random() * 12; // Tamaño variable
                this.color = palette[Math.floor(Math.random() * palette.length)];
                
                // Generar geometría compleja (polígono de 3 a 6 lados)
                this.vertices = [];
                const sides = 3 + Math.floor(Math.random() * 4);
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const dist = this.size * (0.6 + Math.random() * 0.8);
                    this.vertices.push({
                        x: Math.cos(angle) * dist,
                        y: Math.sin(angle) * dist
                    });
                }
            }

            // Actualizar la posición basada en el tiempo
            update(time) {
                // Calculamos el desplazamiento (bamboleo) sinoidal
                // Math.sin devuelve un valor entre -1 y 1, que multiplicamos por maxDriftPixels.
                const driftX = Math.sin(time * this.speedX + this.seedX) * maxDriftPixels;
                const driftY = Math.cos(time * this.speedY + this.seedY) * maxDriftPixels;

                // Aplicar el movimiento a la posición base
                this.x = this.baseX + driftX;
                this.y = this.baseY + driftY;
            }

            // Dibujar el fragmento en el lienzo
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y); // Mover el contexto a la posición del fragmento
                
                // Un ligero efecto de resplandor (glow) para que resalten
                ctx.shadowBlur = this.size * 1.5;
                ctx.shadowColor = this.color;
                
                ctx.fillStyle = this.color;
                ctx.beginPath();
                
                // Dibujar el polígono desde sus vértices
                ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for (let i = 1; i < this.vertices.length; i++) {
                    ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                }
                ctx.closePath();
                ctx.fill();
                
                ctx.restore(); // Restaurar el contexto
            }
        }

        // Inicializar la escena
        function init() {
            window.addEventListener('resize', resize);
            resize(); // Configuración inicial

            const palette = getColorPalette();
            fragments.length = 0; // Limpiar lista
            for (let i = 0; i < NUMBER_OF_FRAGMENTS; i++) {
                fragments.push(new Fragment(palette));
            }
        }

        // Bucle principal de animación
        function animate(time) {
            // Limpiar el lienzo en cada frame (usamos transparency para que se vea la imagen base)
            ctx.clearRect(0, 0, width, height);
            
            // Actualizar y dibujar cada fragmento
            for (const fragment of fragments) {
                fragment.update(time);
                fragment.draw(ctx);
            }
            
            // Solicitar el siguiente frame de animación
            requestAnimationFrame(animate);
        }

        // Ejecutar
        init();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
